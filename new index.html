<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Performance Dashboard — Top Notch Roofing</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --header-bg: #dae6ef;
    --page-bg: #f5f7fa;
    --card-bg: #ffffff;
    --accent: #fda10d;
    --subhead: #3c6565;
    --text-primary: #1a2035;
    --text-muted: #6b7a8d;
    --border: #e2e8f0;
    --up: #2d7a5a;
    --up-bg: #e6f4ee;
    --down: #c0392b;
    --down-bg: #fdecea;
    --neutral-bg: #f0f4f8;
    --font: 'Barlow', sans-serif;
    --font-display: 'Barlow Condensed', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--page-bg); color: var(--text-primary); min-height: 100vh; font-size: 15px; line-height: 1.5; }

  /* ── Header ── */
  .header { background: var(--header-bg); border-bottom: 1px solid #c5d8e5; padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 64px; position: sticky; top: 0; z-index: 100; }
  .header-logos { display: flex; align-items: center; gap: 20px; }
  .logo-divider { width: 1px; height: 28px; background: #a8c4d4; }
  .logo-wr { height: 30px; object-fit: contain; }
  .logo-tnr { height: 34px; object-fit: contain; filter: invert(25%) sepia(30%) saturate(400%) hue-rotate(140deg) brightness(0.5); }
  .header-badge { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--subhead); background: rgba(60,101,101,0.1); padding: 4px 12px; border-radius: 99px; border: 1px solid rgba(60,101,101,0.2); }

  /* ── Month tabs ── */
  .month-bar { background: #fff; border-bottom: 1px solid var(--border); padding: 0 32px; display: flex; overflow-x: auto; scrollbar-width: none; }
  .month-bar::-webkit-scrollbar { display: none; }
  .month-btn { font-family: var(--font); font-size: 13px; font-weight: 500; color: var(--text-muted); background: transparent; border: none; padding: 14px 18px 12px; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: color 0.15s, border-color 0.15s; }
  .month-btn:hover { color: var(--text-primary); }
  .month-btn.active { color: var(--text-primary); border-bottom-color: var(--accent); font-weight: 600; }

  /* ── Layout ── */
  .main { max-width: 1000px; margin: 0 auto; padding: 32px 24px 60px; }

  /* ── Section headers ── */
  .section-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 16px; margin-top: 36px; }
  .section-header:first-child { margin-top: 0; }
  .section-title { font-family: var(--font-display); font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); }
  .section-desc { font-size: 13px; color: var(--subhead); font-weight: 500; }

  /* ── Metric cards ── */
  .biz-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 12px; }
  .metric-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; position: relative; overflow: hidden; transition: box-shadow 0.2s; }
  .metric-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
  .metric-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 10px 10px 0 0; }
  .accent-orange::after { background: var(--accent); }
  .accent-teal::after { background: var(--subhead); }
  .metric-label { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--subhead); margin-bottom: 8px; }
  .metric-value { font-family: var(--font-display); font-size: 38px; font-weight: 700; color: var(--text-primary); line-height: 1; margin-bottom: 8px; }
  .metric-delta { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 600; padding: 3px 8px; border-radius: 99px; }
  .delta-up { background: var(--up-bg); color: var(--up); }
  .delta-down { background: var(--down-bg); color: var(--down); }
  .delta-neutral { background: var(--neutral-bg); color: var(--text-muted); }
  .metric-sub { font-size: 12px; color: var(--text-muted); margin-top: 6px; }
  .roi-explainer { margin-top: 8px; font-size: 13px; color: var(--accent); font-weight: 600; }
  .bar-chart-mini { display: flex; align-items: flex-end; gap: 3px; height: 36px; margin-top: 10px; }
  .bar-mini { flex: 1; background: #e8eeea; border-radius: 2px 2px 0 0; }
  .bar-mini.current { background: var(--accent); }
  .yoy-row { display: flex; align-items: center; gap: 16px; margin-top: 10px; }
  .yoy-col { flex: 1; text-align: center; }
  .yoy-col-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
  .yoy-col-value { font-family: var(--font-display); font-size: 28px; font-weight: 700; }
  .yoy-col-value.this-year { color: var(--text-primary); }
  .yoy-col-value.last-year { color: #b0bec8; }
  .yoy-arrow { font-size: 20px; color: var(--subhead); font-weight: 700; }

  /* ── Charts row ── */
  .charts-row { display: grid; grid-template-columns: 1fr 400px; gap: 16px; }
  .chart-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 22px 24px; }
  .chart-card-title { font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--subhead); margin-bottom: 18px; }
  .donut-wrap { display: flex; align-items: center; gap: 24px; }
  .donut-canvas-wrap { position: relative; width: 150px; height: 150px; flex-shrink: 0; }
  .donut-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; pointer-events: none; }
  .donut-center-num { font-family: var(--font-display); font-size: 28px; font-weight: 700; color: var(--text-primary); line-height: 1; }
  .donut-center-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }
  .donut-legend { flex: 1; display: flex; flex-direction: column; gap: 12px; }
  .legend-item { display: flex; align-items: center; justify-content: space-between; }
  .legend-left { display: flex; align-items: center; gap: 8px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .legend-name { font-size: 13px; color: var(--text-primary); font-weight: 500; }
  .legend-sub { font-size: 11px; color: var(--text-muted); }
  .legend-right { text-align: right; }
  .legend-val { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--text-primary); line-height: 1; }
  .legend-pct { font-size: 11px; color: var(--text-muted); }

  /* ── Divider ── */
  .divider { border: none; border-top: 1px solid var(--border); margin: 32px 0 0; }

  /* ── Info tooltip ── */
  .info-wrap { position: relative; display: inline-flex; align-items: center; margin-left: 6px; vertical-align: middle; }
  .info-btn { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid var(--text-muted); background: transparent; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: var(--text-muted); line-height: 1; padding: 0; transition: border-color 0.15s, color 0.15s; flex-shrink: 0; }
  .info-btn:hover { border-color: var(--subhead); color: var(--subhead); }
  /* tooltip removed — replaced with info cards */

  /* ── Info explanation cards ── */
  .info-card { background: #f8faff; border: 1px solid #dae6ef; border-radius: 10px; padding: 16px 18px; margin-top: 10px; }
  .info-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .info-card-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 15px; }
  .info-card-title { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .info-card-body { font-size: 12px; color: var(--text-muted); line-height: 1.6; }
  .info-card-impact { margin-top: 10px; padding-top: 10px; border-top: 1px solid #dae6ef; display: flex; gap: 8px; align-items: flex-start; }
  .info-card-impact-label { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--accent); white-space: nowrap; margin-top: 1px; }
  .info-card-impact-text { font-size: 12px; color: var(--subhead); line-height: 1.5; font-weight: 500; }

  /* ── Vanity section wrapper ── */
  .vanity-grid { display: flex; flex-direction: column; gap: 10px; }

  /* ── Standard vanity card ── */
  .vanity-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; display: grid; grid-template-columns: 230px 1fr 110px; align-items: center; gap: 20px; transition: box-shadow 0.2s; }
  .vanity-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .vanity-name { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 2px; display: flex; align-items: center; }
  .vanity-desc { font-size: 11px; color: var(--text-muted); line-height: 1.4; }
  .vanity-bar-track { height: 7px; background: #e8eef4; border-radius: 99px; overflow: hidden; margin-bottom: 5px; }
  .vanity-bar-fill { height: 100%; border-radius: 99px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }
  .vanity-bar-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-muted); }
  .vanity-right { text-align: right; }
  .vanity-value { font-family: var(--font-display); font-size: 24px; font-weight: 700; color: var(--text-primary); line-height: 1; }
  .vanity-delta { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 99px; margin-top: 5px; }

  /* ── Local visibility card ── */
  .local-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .local-card-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
  .local-card-title { font-size: 14px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; }
  .local-card-body { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
  .local-col { padding: 16px 20px; }
  .local-col + .local-col { border-left: 1px solid var(--border); }
  .local-col-label { font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }

  /* ── Organic keywords ── */
  .kw-label { font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
  .kw-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .kw-row:last-child { border-bottom: none; }
  .kw-keyword { flex: 1; font-size: 13px; color: var(--text-primary); font-weight: 500; }
  .kw-chg { font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 99px; min-width: 48px; text-align: center; }
  .pos-badge { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 6px; font-family: var(--font-display); font-size: 16px; font-weight: 700; }
  .pos-top3  { background: #e6f4ee; color: #2d7a5a; }
  .pos-top10 { background: #fff3e0; color: #e65c00; }
  .pos-other { background: #f0f4f8; color: #6b7a8d; }
  .gmp-chg { font-size: 10px; font-weight: 600; padding: 1px 5px; border-radius: 99px; margin-top: 2px; display: inline-block; }

  /* ── Geo-grid map ── */
  .geo-grid-wrap { position: relative; border-radius: 8px; overflow: hidden; background: #e8f0e8; border: 1px solid #c8d8c8; }
  .geo-map-bg { width: 100%; display: block; }
  .geo-overlay { position: absolute; inset: 0; }
  .geo-pin { position: absolute; transform: translate(-50%, -100%); cursor: default; }
  .geo-pin-body { display: flex; align-items: center; justify-content: center; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); box-shadow: 0 2px 6px rgba(0,0,0,0.25); }
  .geo-pin-body.rank-1-2 { background: #34a853; }
  .geo-pin-body.rank-3-5 { background: #fbbc04; }
  .geo-pin-body.rank-6-9 { background: #ff6d00; }
  .geo-pin-body.rank-10p { background: #ea4335; }
  .geo-pin-num { transform: rotate(45deg); font-size: 11px; font-weight: 700; color: #fff; line-height: 1; }
  .geo-star { position: absolute; transform: translate(-50%,-50%); }
  .geo-legend { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
  .geo-legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-muted); }
  .geo-legend-dot { width: 10px; height: 10px; border-radius: 2px; }

  /* ── Google Maps business panel ── */
  .gbp-panel { border: 1px solid #dadce0; border-radius: 8px; overflow: hidden; font-family: Arial, sans-serif; background: #fff; }
  .gbp-header { background: #f8f9fa; padding: 8px 12px; border-bottom: 1px solid #dadce0; display: flex; align-items: center; gap: 6px; }
  .gbp-header-dot { width: 8px; height: 8px; border-radius: 50%; }
  .gbp-title { font-size: 11px; color: #3c4043; font-weight: 600; flex: 1; }
  .gbp-sponsored { font-size: 10px; color: #70757a; padding: 6px 12px 2px; font-style: italic; border-bottom: 1px solid #f1f3f4; }
  .gbp-result { padding: 10px 12px; border-bottom: 1px solid #f1f3f4; transition: background 0.1s; }
  .gbp-result:last-child { border-bottom: none; }
  .gbp-result:hover { background: #f8f9fa; }
  .gbp-result.is-client { background: #f0faf4; border-left: 3px solid #34a853; }
  .gbp-result-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .gbp-name { font-size: 14px; font-weight: 600; color: #1a0dab; line-height: 1.2; }
  .gbp-name.client-name { color: #0d7c3b; }
  .gbp-you-badge { font-size: 9px; background: #0d7c3b; color: #fff; padding: 1px 5px; border-radius: 3px; font-weight: 700; letter-spacing: 0.04em; white-space: nowrap; margin-top: 2px; }
  .gbp-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .gbp-action-btn { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .gbp-action-icon { width: 28px; height: 28px; border-radius: 50%; background: #e8f0fe; display: flex; align-items: center; justify-content: center; }
  .gbp-action-label { font-size: 9px; color: #1a73e8; font-weight: 500; }
  .gbp-meta { font-size: 11px; color: #70757a; margin-top: 3px; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
  .gbp-stars-row { display: flex; align-items: center; gap: 3px; margin-top: 2px; }
  .gbp-stars-fill { color: #f9ab00; font-size: 12px; letter-spacing: 1px; }
  .gbp-review-count { font-size: 11px; color: #70757a; }
  .gbp-open { color: #188038; font-weight: 600; }
  .gbp-closed { color: #c5221f; font-weight: 600; }
  .gbp-review-snippet { font-size: 11px; color: #4d5156; margin-top: 4px; line-height: 1.4; display: flex; gap: 4px; }
  .gbp-review-icon { font-size: 12px; flex-shrink: 0; margin-top: 1px; }
  .gbp-more { text-align: center; padding: 8px; font-size: 12px; color: #1a73e8; font-weight: 500; border-top: 1px solid #f1f3f4; cursor: default; }
  .gbp-map-strip { height: 80px; background: linear-gradient(135deg,#c8dfc8 0%,#b8d4d8 50%,#a8c8d0 100%); position: relative; overflow: hidden; border-top: 1px solid #dadce0; display: flex; align-items: center; justify-content: center; }
  .gbp-map-label { font-size: 10px; color: #3c4043; background: rgba(255,255,255,0.8); padding: 3px 8px; border-radius: 4px; font-weight: 500; }

  /* ── Tip box ── */
  .tip-box { margin-top: 16px; background: #fff8ee; border: 1px solid #fde4b0; border-radius: 10px; padding: 14px 18px; display: flex; gap: 12px; align-items: flex-start; }
  .tip-icon { width: 18px; height: 18px; flex-shrink: 0; color: var(--accent); margin-top: 2px; }
  .tip-box p { font-size: 13px; color: #7a6030; line-height: 1.6; }
  .tip-box strong { color: var(--text-primary); }

  /* ── Footer ── */
  .footer { text-align: center; padding: 24px; font-size: 12px; color: var(--text-muted); border-top: 1px solid var(--border); margin-top: 40px; }
  .footer a { color: var(--subhead); text-decoration: none; font-weight: 500; }

  /* ── Loading ── */
  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 16px; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--text-muted); }

  /* ── Responsive ── */
  @media (max-width: 800px) {
    .biz-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
    .charts-row { grid-template-columns: 1fr; }
    .local-card-body { grid-template-columns: 1fr; }
    .map-pack-col { border-right: none; border-bottom: 1px solid var(--border); }
    .vanity-card { grid-template-columns: 1fr; gap: 8px; }
    .vanity-right { text-align: left; }
    .header { padding: 0 16px; }
    .main { padding: 20px 16px 40px; }
    .month-bar { padding: 0 16px; }
  }
  @media (max-width: 480px) { .biz-grid { grid-template-columns: 1fr; } }
</style>
</head>

<header class="header">

<script>
const APPS_SCRIPT_URL = 'YOUR_APPS_SCRIPT_URL_HERE';
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ── Info card definitions ─────────────────────────────────────
const INFO_CARDS = {
  visibility: {
    icon: '🔍', color: '#e6f1fb', title: 'Google visibility score',
    body: 'This score (0–100) measures how prominently your business appears across all Google searches in your service area. It combines your map pack presence, organic rankings, and overall local SEO strength into one number.',

  },
  mappack: {
    icon: '📍', color: '#e6f4ee', title: 'Local map pack ranking',
    body: 'The map pack is the block of 3 local businesses Google shows at the very top of results — above all organic links. It appears on nearly every local search and receives the majority of all clicks. Your position here is the single biggest driver of inbound calls and form fills.',

  },
  organic: {
    icon: '🔗', color: '#fff8ee', title: 'Organic keyword positions',
    body: 'Your website\'s positions in Google\'s regular search results — the blue links below the map pack. Each keyword is a search term homeowners use to find roofing services. Your position determines how many people see your link and click through.',
    impact: 'Position #1 gets ~28% of all clicks. Position #5 gets ~7%. Five keywords moving from page 2 to page 1 can add 8–12 leads per month.'
  },
  keywords: {
    icon: '📊', color: '#f0f4f8', title: 'Keywords on page 1',
    body: 'The total count of search terms where your website appears on the first page of Google (positions 1–10). Each page-1 keyword is an active channel bringing homeowners to your site. Keywords on page 2 receive almost no traffic.',
    impact: 'Think of each page-1 keyword as a door into your business. Every new keyword added to page 1 is a new group of homeowners who can find you — without paying for ads.'

  timeonsite: {
    icon: '⏱️', color: '#fff3e0', title: 'Average time on site',

  },
  authority: {
    icon: '⭐', color: '#eeedfe', title: 'Website authority score',
    body: 'A score (0–100) reflecting how much Google trusts your website, based on the number and quality of other websites linking to yours. A roofing association listing, a news mention, or a supplier page linking to you all contribute. It builds slowly but never resets.',
    impact: 'Authority is a force multiplier — a higher score makes every other SEO effort more effective. A site at authority 40 ranks faster for new keywords than one at 25, even with the same content.'
  },
};

function infoBtn(key) {
  return `<span style="display:inline-flex;align-items:center;margin-left:6px;vertical-align:middle;">
    <button class="info-btn" aria-label="More info" onclick="toggleCard('card-${key}',this)">i</button>

  btn.style.color = open ? '' : '#fff';

}

// ── Helpers ──────────────────────────────────────────────────
const fmt       = n => Number(n).toLocaleString('en-CA');
const fmtDollar = n => '$' + Number(n).toLocaleString('en-CA');
const fmtPct    = n => Number(n).toFixed(1) + '%';

function dtag(cur, prev, fn) {
  const d = cur - prev, cls = d >= 0 ? 'delta-up' : 'delta-down';
  return `<span class="metric-delta ${cls}">${d>=0?'↑':'↓'} ${fn?fn(Math.abs(d)):Math.abs(d)} vs last month</span>`;
}

function miniBar(vals) {
  if (!vals||!vals.length) return '';
  const mx = Math.max(...vals,1);
  return `<div class="bar-chart-mini">${vals.map((v,i)=>{
    const h=Math.max(4,Math.round((v/mx)*36));
    return `<div class="bar-mini ${i===vals.length-1?'current':''}" style="height:${h}px"></div>`;
  }).join('')}</div>`;
}

function progBar(score, color) {
  const p = Math.min(100,Math.max(0,score));
  return `<div class="vanity-bar-track"><div class="vanity-bar-fill" style="width:${p}%;background:${color}"></div></div>
          <div class="vanity-bar-labels"><span>0</span><span>50</span><span>100</span></div>`;
}

function posBadge(pos) {
  const cls = pos <= 3 ? 'pos-top3' : pos <= 10 ? 'pos-top10' : 'pos-other';
  return `<span class="pos-badge ${cls}">${pos}</span>`;
}

function posChange(cur, prev) {
  const diff = prev - cur; // lower pos = better
  if (diff === 0) return `<span class="kw-chg delta-neutral">—</span>`;
  const cls = diff > 0 ? 'delta-up' : 'delta-down';
  return `<span class="kw-chg ${cls}">${diff>0?'↑':'↓'}${Math.abs(diff)}</span>`;
}

function buildDonutSvg(good, medium, bad, total) {
  const cx=35, cy=35, r=28, inner=18;
  const pGood   = good/total;
  const pMedium = medium/total;
  const pBad    = bad/total;

  function slice(startAngle, endAngle, color) {
    const s = startAngle * Math.PI/180 - Math.PI/2;
    const e = endAngle   * Math.PI/180 - Math.PI/2;
    const x1=cx+r*Math.cos(s), y1=cy+r*Math.sin(s);
    const x2=cx+r*Math.cos(e), y2=cy+r*Math.sin(e);
    const ix1=cx+inner*Math.cos(s),iy1=cy+inner*Math.sin(s);
    const ix2=cx+inner*Math.cos(e),iy2=cy+inner*Math.sin(e);
    const large = (endAngle-startAngle) > 180 ? 1 : 0;
    return `<path d="M${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} L${ix2},${iy2} A${inner},${inner} 0 ${large},0 ${ix1},${iy1} Z" fill="${color}"/>`;
  }

  const a1 = 0;
  const a2 = a1 + pGood*360;
  const a3 = a2 + pMedium*360;
  const a4 = a3 + pBad*360;

  return slice(a1,a2,'#34a853') + slice(a2,a3,'#ff8c00') + slice(a3,a4,'#ea4335');
}

function drawBar(d) {
  const ctx = document.getElementById('barChart');

  const ytd = d.monthly_leads_ytd || [];
  const last = ytd.reduce((acc,v,i) => v>0?i:acc, -1);
  barChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: MONTHS_SHORT,
      datasets: [{ data: ytd, backgroundColor: ytd.map((v,i) => v===0?'rgba(0,0,0,0)':i===last?'#fda10d':'#3c6565'), borderRadius: 4, borderSkipped: false }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => c.parsed.y>0?c.parsed.y+' leads':'No data yet' } } },
      scales: {
        x: { grid: { display: false }, border: { display: false }, ticks: { color: '#6b7a8d', font: { family: 'Barlow', size: 12 }, autoSkip: false } },
        y: { grid: { color: '#f0f4f8' }, border: { display: false }, ticks: { color: '#6b7a8d', font: { family: 'Barlow', size: 12 }, stepSize: 1, precision: 0 }, beginAtZero: true }
      }
    }
  });
}

function drawDonut(src, total) {

    type: 'doughnut',
    data: {
      labels: ['Google Business Profile','Website','Direct Calls'],
      datasets: [{ data: [src.gbp,src.website,src.calls], backgroundColor: ['#3c6565','#fda10d','#6ab0b0'], borderWidth: 3, borderColor: '#ffffff', hoverOffset: 4 }]
    },
    options: {
      responsive: false, cutout: '68%',
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => c.label+': '+c.parsed+' leads ('+(total>0?Math.round(c.parsed/total*100):0)+'%)' } } }
    }
  });
}
