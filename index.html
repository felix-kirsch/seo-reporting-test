<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Performance Dashboard — Top Notch Roofing</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --header-bg: #dae6ef;
    --page-bg: #f5f7fa;
    --card-bg: #ffffff;
    --accent: #fda10d;
    --subhead: #3c6565;
    --text-primary: #1a2035;
    --text-muted: #6b7a8d;
    --border: #e2e8f0;
    --up: #2d7a5a;
    --up-bg: #e6f4ee;
    --down: #c0392b;
    --down-bg: #fdecea;
    --neutral-bg: #f0f4f8;
    --font: 'Barlow', sans-serif;
    --font-display: 'Barlow Condensed', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--page-bg); color: var(--text-primary); min-height: 100vh; font-size: 15px; line-height: 1.5; }

  .header {
    background: var(--header-bg);
    border-bottom: 1px solid #c5d8e5;
    padding: 0 32px;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px; position: sticky; top: 0; z-index: 100;
  }
  .header-logos { display: flex; align-items: center; gap: 20px; }
  .logo-divider { width: 1px; height: 28px; background: #a8c4d4; }
  .logo-wr { height: 30px; object-fit: contain; }
  .logo-tnr { height: 34px; object-fit: contain; filter: invert(25%) sepia(30%) saturate(400%) hue-rotate(140deg) brightness(0.5); }
  .header-badge {
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--subhead); background: rgba(60,101,101,0.1);
    padding: 4px 12px; border-radius: 99px; border: 1px solid rgba(60,101,101,0.2);
  }

  .month-bar {
    background: #fff; border-bottom: 1px solid var(--border);
    padding: 0 32px; display: flex; gap: 0; overflow-x: auto; scrollbar-width: none;
  }
  .month-bar::-webkit-scrollbar { display: none; }
  .month-btn {
    font-family: var(--font); font-size: 13px; font-weight: 500; color: var(--text-muted);
    background: transparent; border: none; padding: 14px 18px 12px; cursor: pointer;
    border-bottom: 2px solid transparent; white-space: nowrap; transition: color 0.15s, border-color 0.15s;
  }
  .month-btn:hover { color: var(--text-primary); }
  .month-btn.active { color: var(--text-primary); border-bottom-color: var(--accent); font-weight: 600; }

  .main { max-width: 1000px; margin: 0 auto; padding: 32px 24px 60px; }

  .section-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 16px; margin-top: 36px; }
  .section-header:first-child { margin-top: 0; }
  .section-title { font-family: var(--font-display); font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); }
  .section-desc { font-size: 13px; color: var(--subhead); font-weight: 500; }

  .biz-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 12px; }

  .metric-card {
    background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 18px 20px; position: relative; overflow: hidden; transition: box-shadow 0.2s;
  }
  .metric-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
  .metric-card::after {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 3px; border-radius: 10px 10px 0 0;
  }
  .accent-orange::after { background: var(--accent); }
  .accent-teal::after   { background: var(--subhead); }

  .metric-label { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--subhead); margin-bottom: 8px; }
  .metric-value { font-family: var(--font-display); font-size: 38px; font-weight: 700; color: var(--text-primary); line-height: 1; margin-bottom: 8px; }
  .metric-delta { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 600; padding: 3px 8px; border-radius: 99px; }
  .delta-up   { background: var(--up-bg);      color: var(--up); }
  .delta-down { background: var(--down-bg);     color: var(--down); }
  .delta-neutral { background: var(--neutral-bg); color: var(--text-muted); }
  .metric-sub { font-size: 12px; color: var(--text-muted); margin-top: 6px; }
  .roi-explainer { margin-top: 8px; font-size: 13px; color: var(--accent); font-weight: 600; }

  .bar-chart-mini { display: flex; align-items: flex-end; gap: 3px; height: 36px; margin-top: 10px; }
  .bar-mini { flex: 1; background: #e8eeea; border-radius: 2px 2px 0 0; }
  .bar-mini.current { background: var(--accent); }

  .yoy-row { display: flex; align-items: center; gap: 16px; margin-top: 10px; }
  .yoy-col { flex: 1; text-align: center; }
  .yoy-col-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
  .yoy-col-value { font-family: var(--font-display); font-size: 28px; font-weight: 700; }
  .yoy-col-value.this-year { color: var(--text-primary); }
  .yoy-col-value.last-year { color: #b0bec8; }
  .yoy-arrow { font-size: 20px; color: var(--subhead); font-weight: 700; }

  .divider { border: none; border-top: 1px solid var(--border); margin: 32px 0 0; }

  .charts-row { display: grid; grid-template-columns: 1fr 400px; gap: 16px; }

  .chart-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 22px 24px; }
  .chart-card-title { font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--subhead); margin-bottom: 18px; }

  .donut-wrap { display: flex; align-items: center; gap: 24px; }
  .donut-canvas-wrap { position: relative; width: 150px; height: 150px; flex-shrink: 0; }
  .donut-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; pointer-events: none; }
  .donut-center-num { font-family: var(--font-display); font-size: 28px; font-weight: 700; color: var(--text-primary); line-height: 1; }
  .donut-center-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }
  .donut-legend { flex: 1; display: flex; flex-direction: column; gap: 12px; }
  .legend-item { display: flex; align-items: center; justify-content: space-between; }
  .legend-left { display: flex; align-items: center; gap: 8px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .legend-name { font-size: 13px; color: var(--text-primary); font-weight: 500; }
  .legend-sub { font-size: 11px; color: var(--text-muted); }
  .legend-right { text-align: right; }
  .legend-val { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--text-primary); line-height: 1; }
  .legend-pct { font-size: 11px; color: var(--text-muted); }

  .vanity-grid { display: flex; flex-direction: column; gap: 10px; }
  .vanity-card {
    background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px 20px; display: grid; grid-template-columns: 210px 1fr 110px;
    align-items: center; gap: 20px; transition: box-shadow 0.2s;
  }
  .vanity-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .vanity-name { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 2px; }
  .vanity-desc { font-size: 11px; color: var(--text-muted); line-height: 1.4; }
  .vanity-bar-track { height: 7px; background: #e8eef4; border-radius: 99px; overflow: hidden; margin-bottom: 5px; }
  .vanity-bar-fill { height: 100%; border-radius: 99px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }
  .vanity-bar-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-muted); }
  .vanity-right { text-align: right; }
  .vanity-value { font-family: var(--font-display); font-size: 24px; font-weight: 700; color: var(--text-primary); line-height: 1; }
  .vanity-delta { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 99px; margin-top: 5px; }

  .tip-box {
    margin-top: 16px; background: #fff8ee; border: 1px solid #fde4b0;
    border-radius: 10px; padding: 14px 18px; display: flex; gap: 12px; align-items: flex-start;
  }
  .tip-icon { width: 18px; height: 18px; flex-shrink: 0; color: var(--accent); margin-top: 2px; }
  .tip-box p { font-size: 13px; color: #7a6030; line-height: 1.6; }
  .tip-box strong { color: var(--text-primary); }

  .footer { text-align: center; padding: 24px; font-size: 12px; color: var(--text-muted); border-top: 1px solid var(--border); margin-top: 40px; }
  .footer a { color: var(--subhead); text-decoration: none; font-weight: 500; }

  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 16px; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--text-muted); }

  @media (max-width: 800px) {
    .biz-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
    .charts-row { grid-template-columns: 1fr; }
    .vanity-card { grid-template-columns: 1fr; gap: 8px; }
    .vanity-right { text-align: left; }
    .header { padding: 0 16px; }
    .main { padding: 20px 16px 40px; }
    .month-bar { padding: 0 16px; }
  }
  @media (max-width: 480px) {
    .biz-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-logos">
    <img class="logo-wr"
         src="https://webrunnermedia.com/wp-content/uploads/2021/10/WR-Main-Logo-SM-Dark.png"
         alt="Webrunner Media"
         onerror="this.style.display='none'">
    <div class="logo-divider"></div>
    <img class="logo-tnr"
         src="https://images.squarespace-cdn.com/content/v1/629922ea930c6719491960c4/7a761e92-5cb8-415e-b179-5d8f225bae2c/Secondary+Logo+-+wh.png?format=400w"
         alt="Top Notch Roofing"
         onerror="this.style.display='none'">
  </div>
  <span class="header-badge">SEO Dashboard</span>
</header>

<nav class="month-bar" id="monthBar"></nav>

<main class="main" id="mainContent">
  <div class="loading">
    <div class="spinner"></div>
    <div class="loading-text">Loading your dashboard...</div>
  </div>
</main>

<footer class="footer">
  Powered by <a href="https://webrunnermedia.com" target="_blank">Webrunner Media Group</a>
  &nbsp;·&nbsp; <a href="https://webrunnermedia.com" target="_blank">webrunnermedia.com</a>
  &nbsp;·&nbsp; 1-888-607-0669
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const APPS_SCRIPT_URL = 'YOUR_APPS_SCRIPT_URL_HERE';

const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const PLACEHOLDER_DATA = [
  {
    month: 'April 2026',
    leads: 14, leads_prev: 11,
    revenue: 28400, revenue_prev: 22200,
    roi: 284, roi_prev: 221,
    conversion_rate: 3.2, conversion_rate_prev: 2.7,
    closing_rate: 57, leads_closed: 8, leads_total: 14,
    leads_yoy_this: 14, leads_yoy_last: 10,
    visitors: 1840, visitors_prev: 1560,
    visitors_6mo: [1100, 1220, 1380, 1490, 1560, 1840],
    visibility_score: 72, visibility_prev: 60,
    keywords_p1: 27, keywords_p1_prev: 22,
    time_on_site: '2m 41s', time_seconds: 161, time_seconds_prev: 139,
    authority_score: 44, authority_prev: 42,
    monthly_leads_ytd: [4, 6, 9, 11, 14, 0, 0, 0, 0, 0, 0, 0],
    lead_sources: { gbp: 6, website: 5, calls: 3 },
  },
  {
    month: 'March 2026',
    leads: 11, leads_prev: 9,
    revenue: 22200, revenue_prev: 18500,
    roi: 221, roi_prev: 185,
    conversion_rate: 2.7, conversion_rate_prev: 2.4,
    closing_rate: 54, leads_closed: 6, leads_total: 11,
    leads_yoy_this: 11, leads_yoy_last: 8,
    visitors: 1560, visitors_prev: 1380,
    visitors_6mo: [900, 1050, 1100, 1220, 1380, 1560],
    visibility_score: 60, visibility_prev: 51,
    keywords_p1: 22, keywords_p1_prev: 18,
    time_on_site: '2m 19s', time_seconds: 139, time_seconds_prev: 118,
    authority_score: 42, authority_prev: 41,
    monthly_leads_ytd: [4, 6, 9, 11, 0, 0, 0, 0, 0, 0, 0, 0],
    lead_sources: { gbp: 5, website: 4, calls: 2 },
  },
  {
    month: 'February 2026',
    leads: 9, leads_prev: 7,
    revenue: 18500, revenue_prev: 14200,
    roi: 185, roi_prev: 142,
    conversion_rate: 2.4, conversion_rate_prev: 2.1,
    closing_rate: 50, leads_closed: 4, leads_total: 9,
    leads_yoy_this: 9, leads_yoy_last: 6,
    visitors: 1380, visitors_prev: 1220,
    visitors_6mo: [750, 820, 900, 1050, 1220, 1380],
    visibility_score: 51, visibility_prev: 44,
    keywords_p1: 18, keywords_p1_prev: 14,
    time_on_site: '1m 58s', time_seconds: 118, time_seconds_prev: 102,
    authority_score: 41, authority_prev: 40,
    monthly_leads_ytd: [4, 6, 9, 0, 0, 0, 0, 0, 0, 0, 0, 0],
    lead_sources: { gbp: 4, website: 3, calls: 2 },
  },
];

let allData = [];
let barChart = null;
let donutChart = null;

async function init() {
  if (APPS_SCRIPT_URL && APPS_SCRIPT_URL !== 'YOUR_APPS_SCRIPT_URL_HERE') {
    try {
      const res = await fetch(APPS_SCRIPT_URL);
      const json = await res.json();
      allData = json.data;
    } catch(e) { allData = PLACEHOLDER_DATA; }
  } else {
    allData = PLACEHOLDER_DATA;
  }
  buildTabs();
  render(0);
}

function buildTabs() {
  document.getElementById('monthBar').innerHTML = allData.map((d,i) =>
    `<button class="month-btn ${i===0?'active':''}" onclick="selectMonth(${i})">${d.month}</button>`
  ).join('');
}

function selectMonth(i) {
  document.querySelectorAll('.month-btn').forEach((b,j) => b.classList.toggle('active', i===j));
  render(i);
}

// helpers
const fmt       = n => Number(n).toLocaleString('en-CA');
const fmtDollar = n => '$' + Number(n).toLocaleString('en-CA');
const fmtPct    = n => Number(n).toFixed(1) + '%';

function dtag(cur, prev, fn) {
  const d = cur - prev;
  const cls = d >= 0 ? 'delta-up' : 'delta-down';
  const v = fn ? fn(Math.abs(d)) : Math.abs(d);
  return `<span class="metric-delta ${cls}">${d>=0?'↑':'↓'} ${v} vs last month</span>`;
}

function miniBar(vals) {
  if (!vals || !vals.length) return '';
  const mx = Math.max(...vals, 1);
  return `<div class="bar-chart-mini">${vals.map((v,i)=>{
    const h = Math.max(4, Math.round((v/mx)*36));
    return `<div class="bar-mini ${i===vals.length-1?'current':''}" style="height:${h}px"></div>`;
  }).join('')}</div>`;
}

function progBar(score, color) {
  const p = Math.min(100, Math.max(0, score));
  return `<div class="vanity-bar-track"><div class="vanity-bar-fill" style="width:${p}%;background:${color}"></div></div>
          <div class="vanity-bar-labels"><span>0</span><span>50</span><span>100</span></div>`;
}

function render(idx) {
  const d = allData[idx];
  if (barChart)   { barChart.destroy();   barChart = null; }
  if (donutChart) { donutChart.destroy(); donutChart = null; }

  const src = d.lead_sources || { gbp: 0, website: 0, calls: 0 };
  const total = src.gbp + src.website + src.calls;

  document.getElementById('mainContent').innerHTML = `

    <div class="section-header">
      <span class="section-title">Business results</span>
      <span class="section-desc">What SEO is doing for your bottom line</span>
    </div>

    <div class="biz-grid">

      <div class="metric-card accent-teal">
        <div class="metric-label">SEO leads this month</div>
        <div class="metric-value">${fmt(d.leads)}</div>
        ${dtag(d.leads, d.leads_prev, fmt)}
        <div class="metric-sub">${d.leads >= d.leads_prev ? 'Up' : 'Down'} from ${fmt(d.leads_prev)} last month</div>
      </div>

      <div class="metric-card accent-teal">
        <div class="metric-label">Revenue from SEO</div>
        <div class="metric-value">${fmtDollar(d.revenue)}</div>
        ${dtag(d.revenue, d.revenue_prev, fmtDollar)}
        <div class="metric-sub">${d.revenue >= d.revenue_prev ? 'Up' : 'Down'} from ${fmtDollar(d.revenue_prev)} last month</div>
      </div>

      <div class="metric-card accent-orange">
        <div class="metric-label">Monthly ROI</div>
        <div class="metric-value">${fmt(d.roi)}%</div>
        ${dtag(d.roi, d.roi_prev, v => v + '%')}
        <div class="roi-explainer">$1 spent → $${(d.roi/100).toFixed(2)} back</div>
      </div>

      <div class="metric-card">
        <div class="metric-label">Conversion rate</div>
        <div class="metric-value">${fmtPct(d.conversion_rate)}</div>
        ${dtag(d.conversion_rate, d.conversion_rate_prev, v => v.toFixed(1) + '%')}
        <div class="metric-sub">Visitors who became leads</div>
        ${miniBar(d.visitors_6mo)}
      </div>

      <div class="metric-card">
        <div class="metric-label">Closing rate</div>
        <div class="metric-value">${fmt(d.closing_rate)}%</div>
        <div class="metric-sub" style="margin-top:10px;">${fmt(d.leads_closed)} of ${fmt(d.leads_total)} leads became clients</div>
      </div>

      <div class="metric-card">
        <div class="metric-label">Year over year leads</div>
        <div class="yoy-row">
          <div class="yoy-col">
            <div class="yoy-col-label">This year</div>
            <div class="yoy-col-value this-year">${fmt(d.leads_yoy_this)}</div>
          </div>
          <div class="yoy-arrow">→</div>
          <div class="yoy-col">
            <div class="yoy-col-label">Last year</div>
            <div class="yoy-col-value last-year">${fmt(d.leads_yoy_last)}</div>
          </div>
        </div>
        ${(()=>{const diff=d.leads_yoy_this-d.leads_yoy_last;const pct=Math.round((diff/d.leads_yoy_last)*100);const cls=diff>=0?'delta-up':'delta-down';return`<span class="metric-delta ${cls}" style="margin-top:10px;">${diff>=0?'↑':'↓'} ${Math.abs(pct)}% same month last year</span>`})()}
      </div>

    </div>

    <!-- Charts row -->
    <hr class="divider">
    <div class="section-header">
      <span class="section-title">Leads overview</span>
      <span class="section-desc">Year-to-date performance and source breakdown</span>
    </div>

    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-card-title">Leads per month — ${new Date().getFullYear()}</div>
        <div style="position:relative;width:100%;height:210px;">
          <canvas id="barChart" role="img" aria-label="Monthly leads bar chart"></canvas>
        </div>
      </div>

      <div class="chart-card">
        <div class="chart-card-title">Lead distribution — ${d.month}</div>
        <div class="donut-wrap">
          <div class="donut-canvas-wrap">
            <canvas id="donutChart" role="img" aria-label="Lead source distribution" width="150" height="150"></canvas>
            <div class="donut-center">
              <div class="donut-center-num">${total}</div>
              <div class="donut-center-label">total leads</div>
            </div>
          </div>
          <div class="donut-legend">
            ${[
              { key:'gbp',     label:'Google Business', sub:'GBP',     color:'#3c6565' },
              { key:'website', label:'Website',          sub:'Organic', color:'#fda10d' },
              { key:'calls',   label:'Direct calls',     sub:'Phone',   color:'#6ab0b0' },
            ].map(s => {
              const val = src[s.key];
              const pct = total > 0 ? Math.round((val/total)*100) : 0;
              return `<div class="legend-item">
                <div class="legend-left">
                  <div class="legend-dot" style="background:${s.color}"></div>
                  <div>
                    <div class="legend-name">${s.label}</div>
                    <div class="legend-sub">${pct}% of leads</div>
                  </div>
                </div>
                <div class="legend-right">
                  <div class="legend-val">${val}</div>
                  <div class="legend-pct">leads</div>
                </div>
              </div>`;
            }).join('')}
          </div>
        </div>
      </div>
    </div>

    <!-- Vanity metrics -->
    <hr class="divider">
    <div class="section-header">
      <span class="section-title">What's driving those results</span>
      <span class="section-desc">Technical signals that feed your business numbers — better scores here means more leads over time</span>
    </div>

    <div class="vanity-grid">

      <div class="vanity-card">
        <div><div class="vanity-name">Google visibility</div><div class="vanity-desc">How often your site shows up when homeowners search for roofing services</div></div>
        <div>${progBar(d.visibility_score,'#378ADD')}</div>
        <div class="vanity-right">
          <div class="vanity-value">${fmt(d.visibility_score)}</div>
          ${(()=>{const diff=d.visibility_score-d.visibility_prev;return`<span class="vanity-delta ${diff>=0?'delta-up':'delta-down'}">${diff>=0?'↑':'↓'} ${Math.abs(diff)} pts</span>`})()}
        </div>
      </div>

      <div class="vanity-card">
        <div><div class="vanity-name">Website visitors from Google</div><div class="vanity-desc">People who found you through a Google search this month</div></div>
        <div>
          ${miniBar(d.visitors_6mo)}
          <div class="vanity-bar-labels" style="margin-top:4px;"><span>6 months ago</span><span>This month</span></div>
        </div>
        <div class="vanity-right">
          <div class="vanity-value">${fmt(d.visitors)}</div>
          ${(()=>{const diff=d.visitors-d.visitors_prev;const pct=Math.round((diff/d.visitors_prev)*100);return`<span class="vanity-delta ${diff>=0?'delta-up':'delta-down'}">${diff>=0?'↑':'↓'} ${Math.abs(pct)}%</span>`})()}
        </div>
      </div>

      <div class="vanity-card">
        <div><div class="vanity-name">Keywords on page 1</div><div class="vanity-desc">Search terms where you appear on the first page of Google results</div></div>
        <div>${progBar(Math.min(d.keywords_p1*2,100),'#3c6565')}</div>
        <div class="vanity-right">
          <div class="vanity-value">${fmt(d.keywords_p1)}</div>
          ${(()=>{const diff=d.keywords_p1-d.keywords_p1_prev;return`<span class="vanity-delta ${diff>=0?'delta-up':'delta-down'}">${diff>=0?'+':''}${diff} this month</span>`})()}
        </div>
      </div>

      <div class="vanity-card">
        <div><div class="vanity-name">Time on site</div><div class="vanity-desc">How long visitors stay before leaving — longer means they like what they see</div></div>
        <div>${progBar(Math.min(Math.round(d.time_seconds/3),100),'#fda10d')}</div>
        <div class="vanity-right">
          <div class="vanity-value">${d.time_on_site}</div>
          ${(()=>{const diff=d.time_seconds-d.time_seconds_prev;const lbl=Math.abs(diff)>=60?Math.round(Math.abs(diff)/60)+'m':Math.abs(diff)+'s';return`<span class="vanity-delta ${diff>=0?'delta-up':'delta-down'}">${diff>=0?'↑':'↓'} ${lbl}</span>`})()}
        </div>
      </div>

      <div class="vanity-card">
        <div><div class="vanity-name">Website authority</div><div class="vanity-desc">How much Google trusts your site — this grows slowly but steadily</div></div>
        <div>${progBar(d.authority_score,'#534AB7')}</div>
        <div class="vanity-right">
          <div class="vanity-value">${fmt(d.authority_score)}</div>
          ${(()=>{const diff=d.authority_score-d.authority_prev;return`<span class="vanity-delta ${diff>=0?'delta-up':'delta-down'}">${diff>=0?'+':''}${diff} pts</span>`})()}
        </div>
      </div>

    </div>

    <div class="tip-box">
      <svg class="tip-icon" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/>
      </svg>
      <p><strong>What this means for you:</strong> The signals above are what drive your lead numbers. More Google visibility and more page-1 keywords means more homeowners finding you — which is exactly why your leads are trending up. We track these so you don't have to.</p>
    </div>
  `;

  requestAnimationFrame(() => {
    drawBar(d);
    drawDonut(src, total);
  });
}

function drawBar(d) {
  const ctx = document.getElementById('barChart');
  if (!ctx) return;
  const ytd = d.monthly_leads_ytd || [];
  const lastActive = ytd.reduce((acc,v,i) => v > 0 ? i : acc, -1);
  barChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: MONTHS_SHORT,
      datasets: [{
        data: ytd,
        backgroundColor: ytd.map((v,i) => v===0 ? 'rgba(0,0,0,0)' : i===lastActive ? '#fda10d' : '#3c6565'),
        borderRadius: 4,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => c.parsed.y > 0 ? c.parsed.y + ' leads' : 'No data yet' } }
      },
      scales: {
        x: {
          grid: { display: false },
          border: { display: false },
          ticks: { color: '#6b7a8d', font: { family: 'Barlow', size: 12 }, autoSkip: false }
        },
        y: {
          grid: { color: '#f0f4f8' },
          border: { display: false },
          ticks: { color: '#6b7a8d', font: { family: 'Barlow', size: 12 }, stepSize: 1, precision: 0 },
          beginAtZero: true,
        }
      }
    }
  });
}

function drawDonut(src, total) {
  const ctx = document.getElementById('donutChart');
  if (!ctx) return;
  donutChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Google Business Profile', 'Website', 'Direct Calls'],
      datasets: [{
        data: [src.gbp, src.website, src.calls],
        backgroundColor: ['#3c6565', '#fda10d', '#6ab0b0'],
        borderWidth: 3,
        borderColor: '#ffffff',
        hoverOffset: 4,
      }]
    },
    options: {
      responsive: false,
      cutout: '68%',
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: c => c.label + ': ' + c.parsed + ' leads (' + (total > 0 ? Math.round(c.parsed/total*100) : 0) + '%)'
          }
        }
      }
    }
  });
}

init();
</script>
</body>
</html>
